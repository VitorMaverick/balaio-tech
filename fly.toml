# fly.toml app configuration file generated for balaio-tech on 2026-06-05T02:32:45-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'balaio-tech'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'sqlite_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
